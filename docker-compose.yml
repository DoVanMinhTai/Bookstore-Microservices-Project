
services:
  nginx:
    image: nginx:1.27.2
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./nginx/templates:/etc/nginx/templates
      - ./nginx/configuration/custom_proxy_settings.conf:/etc/nginx/conf.d/custom_proxy_settings.conf
    ports:
      - "80:80"
    networks:
      - adc-network
  identity.local:
    image: quay.io/keycloak/keycloak:26.0.2
    container_name: identity
    command: 'start-dev --import-realm'
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: admin
      KC_HTTP_PORT: 80
    volumes:
      - ./identity/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - ./identity/themes/uithemes:/opt/keycloak/themes
    networks:
      - adc-network
  customer:
    image: customer:latest
    container_name: customer
    build: ./customer
    environment:
      - SPRING_DATASOURCE_URL= jdbc:postgresql://postgres:5432/customer
      - SERVER_SERVLET_CONTEXT_PATH= /customer
      - SERVER_PORT
      - ADC_PUBLIC_URL=${ADC_PUBLIC_API_URL}/customer
      - SPRING_PROFILES_ACTIVE=dev
    networks:
      - adc-network
  cart:
    image: cart:latest
    container_name: cart
    build: ./cart
    environment:
      - SPRING_DATASOURCE_URL= jdbc:postgresql://postgres:5432/cart
      - SERVER_SERVLET_CONTEXT_PATH= /cart
      - SERVER_PORT
      - ADC_PUBLIC_URL=${ADC_PUBLIC_API_URL}/cart
      - SPRING_PROFILES_ACTIVE=dev
    networks:
      - adc-network
  location:
    image: location:latest
    container_name: location
    build: ./location
    environment:
      - SPRING_DATASOURCE_URL= jdbc:postgresql://postgres:5432/location
      - SERVER_SERVLET_CONTEXT_PATH= /location
      - SERVER_PORT
      - ADC_PUBLIC_URL= ${ADC_PUBLIC_API_URL}/location
      - SPRING_PROFILES_ACTIVE=dev
    networks:
      - adc-network
  inventory:
    container_name: inventory
    build: ./inventory
    image: inventory:latest
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL= jdbc:postgresql://postgres:5432/inventory
      - SERVER_SERVLET_CONTEXT_PATH= /inventory
      - ADC_PUBLIC_URL=${ADC_PUBLIC_API_URL}/inventory
      - SERVER_PORT
    networks:
      - adc-network
  media:
      container_name: media
      build: ./media
      image: media:latest
      environment:
        - SPRING_DATASOURCE_URL= jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/media
        - SERVER_SERVLET_CONTEXT_PATH=/media
        - SERVER_PORT=${SERVER_PORT}
        - SPRING_PROFILES_ACTIVE=dev
        - ADC_PUBLIC_URL= ${ADC_PUBLIC_API_URL}/media
      volumes:
        - ./data/images:/images
      networks:
        - adc-network

  order:
      container_name: order
      build: ./order
      image: order:latest
      environment:
        - SPRING_PROFILES_ACTIVE=dev
        - SPRING_DATASOURCE_URL= jdbc:postgresql://postgres:5432/order
        - SERVER_SERVLET_CONTEXT_PATH= /order
        - SERVER_PORT
        - ADC_PUBLIC_URL= ${ADC_PUBLIC_API_URL}/order
      volumes:
        - ./data/images:/images
  storefront:
      build: ./storefrontbff
      container_name: storefrontbff
      image: storefront-bff:latest
      entrypoint: ["./wait-for-it.sh", "identity:80", "--timeout=300", "--", "java", "-jar", "/app.jar"]
      environment:
        - SPRING_PROFILES_ACTIVE=dev
        - SERVER_PORT
        - ADC_SERVICES_BOOK
        - ADC_SERVICES_CART
        - ADC_SERVICES_CUSTOMER
        - ADC_SERVICES_INVENTORY
        - ADC_SERVICES_LOCATION
        - ADC_SERVICES_MEDIA
        - ADC_SERVICES_ORDER
      networks:
        - adc-network
  product:
      build: ./product
      container_name: product
      image: product:latest
      environment:
        - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/book
        - SERVER_SERVLET_CONTEXT_PATH=/product
        - SERVER_PORT
        - ADC_PUBLIC_URL=${ADC_PUBLIC_API_URL}/product
        - SPRING_PROFILES_ACTIVE=dev
      networks:
        - adc-network
  swagger-ui:
    container_name: swagger-ui
    image: swaggerapi/swagger-ui:v5.17.14
    environment:
      - BASE_URL=/swagger-ui
      - PORT=8090
      - SWAGGER_URLS
      - OAUTH_CLIENT_ID=swagger-ui
      - OAUTH_USE_PKCE=true
      - SPRING_PROFILES_ACTIVE=dev
    networks:
      - adc-network
  postgres:
    image: postgres:16-alpine
    hostname: ${POSTGRES_HOST}
    container_name: postgres
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - ./docker/postgres/postgresql.conf:/usr/share/postgresql/postgresql.conf
      - ./postgres_init.sql:/docker-entrypoint-initdb.d/postgres_init.sql
      - postgres:/var/lib/postgresql/data
    environment:
      SPRING_PROFILES_ACTIVE: dev
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - adc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:6.14
    container_name: pgadmin
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: dev
      PGADMIN_DEFAULT_EMAIL: admin@adc.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SETUP_SERVER_JSON: |
        {
          "servers": [
            {
              "name": "PostgreSQL Server",
              "description": "PostgreSQL Server",
              "username": "admin",
              "password": "admin",
              "group_access": "admin",
              "SSLMode": "prefer",
              "port": 5432,
              "host": "postgres",
              "MaintenanceDB": "postgres"
            }
          ]
        }
    networks:
      - adc-network

networks:
  adc-network:
    driver: bridge
    name: adc-network

volumes:
  postgres:
  pgadmin:
