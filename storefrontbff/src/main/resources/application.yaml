server:
  port: 8087
spring:
  application:
    name: storefront-bff
  threads:
    virtual:
      enabled: true
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: http://identity.local/realms/Identity
        registration:
          keycloak:
            provider: keycloak
            client-id: storefront-bff
            client-secret: O4ZjxsbPLl1c7RxiUO26Y4BzBztGeV1F
            scope: openid, profile, email, roles
---
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty.http.server: DEBUG
---
spring:
  profiles:
    active: dev
  cloud:
    gateway:
      routes:
        - id: api_book
          uri: http://localhost:8080
          predicates:
            - Path=/api/product/**
          filters:
            - TokenRelay=
            - StripPrefix=1
        - id: api_media
          uri: http://localhost:8083
          predicates:
            - Path=/api/media/**
          filters:
            - TokenRelay=
            - StripPrefix=1
        - id: api_location
          uri: http://localhost:8081
          predicates:
            - Path=/api/location/**
          filters:
            - TokenRelay=
            - StripPrefix=1
        - id: api_order
          uri: http://localhost:8085
          predicates:
            - Path=/api/order/**
          filters:
            - TokenRelay=
            - StripPrefix=1
        - id: api_cart
          uri: http://localhost:8084
          predicates:
            - Path=/api/cart/**
          filters:
            - TokenRelay=
            - StripPrefix=1
        - id: api_customer
          uri: http://localhost:8088
          predicates:
            - Path=/api/customer/**
          filters:
            - TokenRelay=
            - StripPrefix=1
        - id: api_inventory
          uri: http://localhost:8086
          predicates:
            - Path=/api/inventory/**
          filters:
            - TokenRelay=
            - StripPrefix=1
      default-filters:
        - SaveSession
